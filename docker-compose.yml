services:
  discord-bot:
    build: .
    container_name: discord_bot
    restart: always
    network_mode: host
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    volumes:
      - .:/app
      - /srv:/data/disk-sdb1:ro
      - /hdd/storage:/data/disk-sdc1:ro
      - /var/run/docker.sock:/var/run/docker.sock
    pid: "host"